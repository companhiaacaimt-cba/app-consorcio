<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Academia Consórcio</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --pk: #1565C0; 
      --bg: #080C18; 
      --cd: rgba(255,255,255,0.03); 
      --tx: #ffffff; 
      --navh: 66px;
      --sb: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--tx); font-family: 'Roboto', sans-serif; overflow: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .content-scroll { flex: 1; overflow-y: auto; padding-bottom: 20px; }

    .mobile-nav { display: none; }
    .desktop-sidebar { width: 280px; min-width: 280px; background: linear-gradient(180deg, #0D1220 0%, #0A0E1A 100%); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; }

    @media (max-width: 768px) {
      .desktop-sidebar { display: none !important; }
      .mobile-nav { display: block; }
      .content-scroll { padding-bottom: calc(var(--navh) + var(--sb) + 20px); }
    }

    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; background: rgba(13, 18, 32, 0.95); backdrop-filter: blur(16px); border-top: 1px solid rgba(255,255,255,0.09); padding-bottom: var(--sb); }
    .nav-inner { display: flex; flex-direction: row; align-items: stretch; width: 100%; max-width: 512px; margin: 0 auto; height: var(--navh); }
    .nb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #6b7280; background: none; border: none; cursor: pointer; padding: 6px 2px; transition: 0.2s; position: relative; }
    .nb.on { color: var(--pk); }
    .nb.on .ni { filter: drop-shadow(0 0 5px rgba(21,101,192,0.5)); }
    .nb.on::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--pk); border-radius: 3px 3px 0 0; }
    .ni { font-size: 20px; display: block; margin-bottom: 2px;}
    .nl { font-size: 10px; font-weight: 700; text-transform: uppercase; }

    .acc-popup { position: absolute; bottom: calc(100% + 8px); right: 8px; width: 240px; background: rgba(20,20,20,0.9); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; box-shadow: 0 -8px 32px rgba(0,0,0,0.5); padding: 8px 0; z-index: 300; display: flex; flex-direction: column; }
    .acc-hd { padding: 8px 16px 5px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .acc-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
    .acc-opt { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; text-align: left; }
    .acc-opt:hover { background: rgba(255,255,255,0.1); }
    
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .animate-fade { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const MODULES = [
      { id: 1, icon: "📚", title: "O que é Consórcio?", desc: "Fundamentos, história e como funciona" },
      { id: 2, icon: "⚙️", title: "Como Funciona na Prática", desc: "Grupos, assembleias, contemplação" },
      { id: 3, icon: "🏆", title: "Tipos de Lance", desc: "Lance livre, fixo, embutido e estratégias" },
      { id: 4, icon: "📊", title: "Comparativo Financeiro", desc: "Consórcio vs Financiamento vs À Vista" },
      { id: 5, icon: "🛡️", title: "Porto Seguro Consórcio", desc: "Produtos, diferenciais e regulamentação" },
      { id: 6, icon: "🎯", title: "Técnicas de Venda", desc: "Perfil de cliente, objeções e fechamento" },
    ];

    const WELCOME = `Olá! 🎓 Seja muito bem-vindo à **Academia Porto Seguro Consórcio**!\n\nSou o **Prof. Dr. Ricardo Mestre**, seu guia nessa jornada.\n\nPor onde quer começar? 🚀`;

    function App() {
      const [currentView, setCurrentView] = useState("chat"); 
      const [accOpen, setAccOpen] = useState(false);
      const [fontSize, setFontSize] = useState(100);
      
      const [messages, setMessages] = useState([{ role: "assistant", content: WELCOME }]);
      const [input, setInput] = useState("");
      const [loadingChat, setLoadingChat] = useState(false);
      const [activeModule, setActiveModule] = useState(null);
      const bottomRef = useRef(null);

      useEffect(() => {
        if (currentView === "chat") bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loadingChat, currentView]);

      const sendMessage = async (text) => {
        if (!text.trim() || loadingChat) return;
        const userMsg = { role: "user", content: text };
        setMessages(prev => [...prev, userMsg]);
        setInput("");
        setLoadingChat(true);
        try {
          const response = await fetch('/api/chat', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: [...messages, userMsg] })
          });
          const data = await response.json();
          if (response.ok) setMessages((prev) => [...prev, { role: "assistant", content: data.reply }]);
          else setMessages((prev) => [...prev, { role: "assistant", content: "❌ Erro: " + (data.error || "Tente novamente.") }]);
        } catch (error) {
          setMessages((prev) => [...prev, { role: "assistant", content: "❌ Erro de conexão com servidor." }]);
        } finally { setLoadingChat(false); }
      };

      const selectModule = async (mod) => {
        setCurrentView("chat"); setActiveModule(mod.id);
        await sendMessage(`Módulo selecionado: "${mod.title}". Faça um resumo direto e termine com uma pergunta.`);
      };

      const handleAccZoom = (dir) => { setFontSize(prev => Math.min(Math.max(prev + dir, 80), 140)); setAccOpen(false); };

      const renderChatContent = (text) => {
        return text.split("\n").map((line, i) => {
          const parts = line.split(/(\*\*[^*]+\*\*)/g);
          return (
            <p key={i} style={{ margin: "4px 0", lineHeight: 1.5 }}>
              {parts.map((part, j) => part.startsWith("**") && part.endsWith("**") ? (<strong key={j} style={{ color: "#fff", fontWeight: 700 }}>{part.slice(2, -2)}</strong>) : (<span key={j}>{part}</span>))}
            </p>
          );
        });
      };

      return (
        <div className="app-container" style={{ zoom: `${fontSize}%` }}>
          
          {/* SIDEBAR (Apenas Desktop) */}
          <div className="desktop-sidebar">
            <div style={{ padding: "20px 16px 12px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ background: "linear-gradient(135deg, var(--pk), #0D47A1)", borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", textTransform: "uppercase" }}>Porto Seguro</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: "#fff" }}>Painel Especialista</div>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "16px 10px" }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: "rgba(255,255,255,0.4)", textTransform: "uppercase", marginBottom: 8, paddingLeft: 10 }}>Treinamentos</div>
              {MODULES.map((mod) => (
                <button key={mod.id} onClick={() => selectModule(mod)} style={{ width: "100%", background: activeModule === mod.id && currentView === "chat" ? "rgba(21,101,192,0.25)" : "transparent", border: `1px solid ${activeModule === mod.id && currentView === "chat" ? "rgba(21,101,192,0.5)" : "transparent"}`, borderRadius: 10, padding: "10px 12px", cursor: "pointer", textAlign: "left", marginBottom: 4, color: "white" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 18 }}>{mod.icon}</span><div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 600 }}>{mod.title}</div></div></div>
                </button>
              ))}
            </div>
          </div>

          <div className="main-content">
            <div style={{ padding: "14px 20px", background: "rgba(255,255,255,0.02)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 12 }}>
              {currentView === "chat" && (<div><div style={{ fontWeight: 700, fontSize: 14, color: "#fff" }}>Prof. Dr. Ricardo Mestre</div><div style={{ fontSize: 11, color: "#34D399" }}>Inteligência Artificial de Vendas</div></div>)}
              {currentView === "modules" && (<div><div style={{ fontWeight: 700, fontSize: 14, color: "#fff" }}>Módulos de Treinamento</div><div style={{ fontSize: 11, color: "var(--pk)" }}>Escolha uma aula</div></div>)}
            </div>

            <div className="content-scroll animate-fade">
              
              {/* --- VIEW: CHAT --- */}
              {currentView === "chat" && (
                <div style={{ padding: "20px 16px", display: "flex", flexDirection: "column", gap: 16 }}>
                  {messages.map((msg, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, flexDirection: msg.role === "user" ? "row-reverse" : "row" }}>
                      <div style={{ maxWidth: "85%", background: msg.role === "user" ? "var(--pk)" : "var(--cd)", border: msg.role === "user" ? "none" : "1px solid rgba(255,255,255,0.05)", borderRadius: "12px", padding: "12px 16px", color: "white", fontSize: 14 }}>
                        {renderChatContent(msg.content)}
                      </div>
                    </div>
                  ))}
                  {loadingChat && <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 13, fontStyle: "italic" }}>Professor está digitando...</div>}
                  <div ref={bottomRef} />
                </div>
              )}

              {/* --- VIEW: MODULES (Mobile) --- */}
              {currentView === "modules" && (
                <div style={{ padding: "20px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
                  {MODULES.map((mod) => (
                    <div key={mod.id} onClick={() => selectModule(mod)} style={{ background: "var(--cd)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "16px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer" }}>
                      <div style={{ fontSize: 28 }}>{mod.icon}</div>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: "bold", color: "#fff" }}>{mod.title}</div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginTop: 4 }}>{mod.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* INPUT CHAT FIXO (Rodapé) */}
            {currentView === "chat" && (
              <div style={{ padding: "12px 16px", background: "var(--bg)", borderTop: "1px solid rgba(255,255,255,0.06)", zIndex: 10 }}>
                <div style={{ display: "flex", gap: 10 }}>
                  <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && sendMessage(input)} placeholder="Sua mensagem..." style={{ flex: 1, padding: "12px", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.2)", background: "rgba(0,0,0,0.3)", color: "white", outline: "none" }} />
                  <button onClick={() => sendMessage(input)} style={{ padding: "0 20px", borderRadius: "8px", background: "var(--pk)", color: "white", border: "none", fontWeight: "bold", cursor: "pointer" }}><i className="fas fa-paper-plane"></i></button>
                </div>
              </div>
            )}
          </div>

          {/* BOTTOM NAV (Mobile) - Ajustada para 4 botões */}
          <nav className="mobile-nav nav-bar">
            <div className="nav-inner">
              <button onClick={() => setCurrentView("chat")} className={`nb ${currentView === "chat" ? "on" : ""}`}><i className="fas fa-robot ni"></i><span className="nl">Professor</span></button>
              <button onClick={() => setCurrentView("modules")} className={`nb ${currentView === "modules" ? "on" : ""}`}><i className="fas fa-graduation-cap ni"></i><span className="nl">Treinos</span></button>
              <button onClick={() => { setCurrentView("chat"); sendMessage("Vamos simular uma venda!"); }} className="nb"><i className="fas fa-handshake ni"></i><span className="nl">Simular</span></button>
              <div style={{ flex: 1, display: "flex", position: "relative" }}>
                <button onClick={() => setAccOpen(!accOpen)} className={`nb ${accOpen ? "on" : ""}`} style={{ width: "100%" }}><i className="fas fa-universal-access ni"></i><span className="nl">Acesso</span></button>
                {accOpen && (
                  <div className="acc-popup">
                    <div className="acc-hd">Tamanho do Texto</div>
                    <button onClick={() => handleAccZoom(10)} className="acc-opt"><i className="fas fa-plus-circle"></i> Aumentar</button>
                    <button onClick={() => handleAccZoom(-10)} className="acc-opt"><i className="fas fa-minus-circle"></i> Diminuir</button>
                    <div className="acc-sep"></div>
                    <button onClick={() => { setFontSize(100); setAccOpen(false); }} className="acc-opt"><i className="fas fa-undo"></i> Redefinir</button>
                  </div>
                )}
              </div>
            </div>
          </nav>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
